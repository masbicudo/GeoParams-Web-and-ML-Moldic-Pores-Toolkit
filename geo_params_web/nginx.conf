events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    upstream flask_app {
        server app:5000;
    }

    upstream streamlit_app {
        server app:8501;
    }

    server {
        listen 80;
        server_name _;
        absolute_redirect off;
        client_max_body_size 20m;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = / {
            return 302 /geo-server/;
        }

        location = /geo-server {
            return 301 /geo-server/;
        }

        location = /geo-server/stats {
            return 301 /geo-server/stats/;
        }

        # Streamlit is configured with the same baseUrlPath, including its
        # WebSocket and health endpoints.
        location ^~ /geo-server/stats/ {
            proxy_pass http://streamlit_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # Flask currently emits root-relative URLs. The trailing slash strips
        # /geo-server before forwarding, and the substitutions preserve the
        # public SageLab-compatible prefix in returned assets and redirects.
        location /geo-server/ {
            proxy_pass http://flask_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect / /geo-server/;

            sub_filter_once off;
            sub_filter_types text/css application/javascript text/javascript;
            sub_filter '"/' '"/geo-server/';
            sub_filter "'/" "'/geo-server/";
            sub_filter '`/' '`/geo-server/';
            sub_filter 'url(/' 'url(/geo-server/';
        }
    }
}
