name: geo-params-web

services:
  prepare:
    image: geo-params-web:latest
    command: ["pdm", "run", "python", "prepare_web_images.py"]
    volumes:
      - ../datasets:/workspace/datasets:ro
      - ./static/imgs_sections:/workspace/geo_params_web/static/imgs_sections

  app:
    image: geo-params-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-geo-params-local-development}
    expose:
      - "5000"
      - "8501"
    restart: unless-stopped
    volumes:
      - ./static/imgs_sections:/workspace/geo_params_web/static/imgs_sections:ro
      - ./static/output:/workspace/geo_params_web/static/output
      - ./log:/workspace/geo_params_web/log
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:5000/", timeout=5);
          urllib.request.urlopen("http://127.0.0.1:8501/geo-server/stats/_stcore/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${GEO_PARAMS_PORT:-8181}:80"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
